name: Bug report
description: Report a reproducible Baseline bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open Baseline
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 26.0"
    validations:
      required: true
  - type: input
    id: baseline
    attributes:
      label: Baseline version or commit
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add logs, screenshots, or screen recordings if useful.
